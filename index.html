<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REVOLUTION</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600&family=Inter:wght@200;400;600&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay"><span class="loading-text">REVOLUTION</span></div>
    <div id="dragon-wipe"></div>
    <canvas id="canvas"></canvas>

    <!-- Main Application -->
    <div id="main-app">
        <nav class="main-nav">
            <div class="logo">SYSTEM</div>
            <div class="nav-links">
                <button class="nav-btn active" data-page="home" onclick="navigateTo('home')">Main</button>
                <button class="nav-btn" data-page="path" onclick="navigateTo('path')">طريق التحرر</button>
                <button class="nav-btn" data-page="light" onclick="navigateTo('light')">Light</button>
                <button class="nav-btn" data-page="countries" onclick="navigateTo('countries')">الدول</button>
                <button class="nav-btn" data-page="palestine" onclick="navigateTo('palestine')">فلسطين</button>
                <button class="nav-btn" data-page="sovereignty" onclick="navigateTo('sovereignty')">السيادة</button>
                <button class="nav-btn" data-page="external" onclick="navigateTo('external')">الأكاذيب</button>
            </div>
        </nav>

        <!-- HOME -->
        <div id="page-home" class="page-view active">
            <h1 class="home-title">TIME OUT</h1>
            <p class="home-subtitle">Whether you believe this is real or not, it will not change reality...</p>
            <button class="cta-btn" onclick="navigateTo('path')">Start The Path</button>
        </div>

        <!-- PATH -->
        <div id="page-path" class="page-view">
            <div class="liberation-content">
                <div class="lib-section"><h1 style="font-size: 2.5rem; margin-bottom: 1rem;">طريق التحرر</h1></div>
                <div class="lib-section"><div class="lib-title">قبل أن تبدأ</div><p>أنت اليوم عبد... الحرية الحقيقية هي أن تكون عبداً لله فقط.</p></div>
            </div>
        </div>

        <!-- LIGHT (White Door) -->
        <div id="page-light" class="page-view">
            <div style="height: 80vh; display: flex; align-items: center; justify-content: center;">
                <div class="door-container" onclick="openBrain()">
                    <div class="white-door"></div>
                    <div class="door-text">Enter The Brain</div>
                </div>
            </div>
        </div>

        <!-- Other Pages (Countries, Palestine, etc) remain unchanged -->
        <div id="page-countries" class="page-view"><div class="section-header"><h2 class="section-title">تاريخ الدول العربية</h2></div><main id="countries-container"></main></div>
        <div id="page-palestine" class="page-view"><div class="section-header"><h2 class="section-title">فلسطين</h2></div><div id="palestine-grid" class="grid-container"></div></div>
        <div id="page-sovereignty" class="page-view"><div class="section-header"><h2 class="section-title">السيادة المخطوفة</h2></div><div id="sovereignty-grid" class="grid-container"></div></div>
        <div id="page-external" class="page-view"><div class="section-header"><h2 class="section-title">الأكاذيب المسيطرة</h2></div><div id="external-grid" class="grid-container"></div></div>

        <button class="donate-btn" onclick="donateAlert()"><svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M5.5 13v1.25c0 .138.112.25.25.25h1a.25.25 0 0 0 .25-.25V13h.5v1.25c0 .138.112.25.25.25h1a.25.25 0 0 0 .25-.25V13h.5v1.25c0 .138.112.25.25.25h1a.25.25 0 0 0 .25-.25V13h.5a.5.5 0 0 0 .5-.5v-9a.5.5 0 0 0-.5-.5h-6a.5.5 0 0 0-.5.5v9a.5.5 0 0 0 .5.5h.5z"/><path d="M8 4a.5.5 0 0 1 .5.5v3a.5.5 0 0 1-1 0v-3A.5.5 0 0 1 8 4zm2 0a.5.5 0 0 1 .5.5v3a.5.5 0 0 1-1 0v-3A.5.5 0 0 1 10 4zm-4 0a.5.5 0 0 1 .5.5v3a.5.5 0 0 1-1 0v-3A.5.5 0 0 1 6 4z"/></svg> Donate</button>
    </div>

    <!-- Modal -->
    <div id="detail-modal" class="modal-overlay"><div class="modal-content"><div id="modal-body"></div></div></div>

    <!-- BRAIN CONTAINER (HEAVEN THEME) -->
    <div id="brain-container">
        <button class="back-btn-heaven" onclick="closeBrain()">← Back to Revolution</button>

        <div class="heaven-layout">
            <!-- Sidebar -->
            <aside class="heaven-sidebar">
                <div class="heaven-logo">🧠 الـبـرين</div>
                <nav id="heaven-nav">
                    <!-- Injected via JS -->
                </nav>
            </aside>

            <!-- Main Content -->
            <main class="heaven-main">
                <!-- Search Box -->
                <div class="heaven-search-box">
                    <input type="text" id="heaven-search" class="heaven-search-input" placeholder="ابحث في أفكار القرآن..." oninput="handleHeavenSearch()">
                    <span class="heaven-search-icon">🔍</span>
                    <div id="heaven-autocomplete" class="heaven-autocomplete"></div>
                </div>

                <!-- Results Grid -->
                <div id="heaven-results" class="heaven-results-grid">
                    <!-- Injected via JS -->
                </div>
            </main>
        </div>

        <!-- Heaven Detail Modal -->
        <div id="heaven-modal" class="heaven-modal-overlay" onclick="if(event.target === this) closeHeavenModal()">
            <div class="heaven-modal-box">
                <div id="heaven-modal-body"></div>
            </div>
        </div>
    </div>
    <!-- RECURRING BLACK DRAGON -->
    <div id="black-dragon" class="black-dragon"></div>

    <script src="data.js"></script>
    <script src="data2.js"></script>
    <script src="script.js"></script>
</body>
</html>
