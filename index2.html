<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Revolution</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --fg: #f1f5f9;
            --border: #334155;
            --accent: #10b981;
            --danger: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Login Screen */
        #login-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e293b);
        }
        .login-box {
            background: var(--card);
            padding: 3rem;
            border-radius: 16px;
            border: 1px solid var(--border);
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        .login-box h1 { margin-bottom: 1.5rem; color: var(--accent); font-size: 1.5rem; }
        .login-box input {
            width: 100%; padding: 12px;
            background: var(--bg); border: 1px solid var(--border);
            color: var(--fg); border-radius: 8px; margin-bottom: 1rem;
            font-size: 1rem;
        }
        .login-box button {
            width: 100%; padding: 12px;
            background: var(--accent); border: none;
            color: #000; font-weight: bold; border-radius: 8px;
            cursor: pointer; transition: opacity 0.3s;
        }
        .login-box button:hover { opacity: 0.9; }

        /* Admin Dashboard */
        #admin-dashboard { display: none; flex-direction: column; height: 100vh; }
        
        header {
            padding: 1rem 2rem;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        header h1 { font-size: 1.2rem; color: var(--accent); }
        header button {
            background: transparent; border: 1px solid var(--border);
            color: var(--fg); padding: 8px 16px; border-radius: 6px; cursor: pointer;
        }

        .main-content {
            flex: 1; display: flex; overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 250px; background: var(--card);
            border-right: 1px solid var(--border);
            padding: 1rem; display: flex; flex-direction: column; gap: 5px;
        }
        .nav-item {
            padding: 12px 16px; border-radius: 8px; cursor: pointer;
            transition: background 0.2s; font-size: 0.9rem;
            border: none; background: transparent; text-align: left; color: var(--fg);
        }
        .nav-item:hover { background: rgba(255,255,255,0.05); }
        .nav-item.active { background: var(--accent); color: #000; font-weight: bold; }

        /* Content Area */
        .content-area {
            flex: 1; padding: 2rem; overflow-y: auto;
            display: flex; flex-direction: column; gap: 1.5rem;
        }

        /* Cards & Forms */
        .admin-card {
            background: var(--card); border-radius: 12px;
            border: 1px solid var(--border); padding: 1.5rem;
        }
        .admin-card h2 { margin-bottom: 1rem; font-size: 1.2rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
        
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-size: 0.85rem; color: #94a3b8; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 10px;
            background: var(--bg); border: 1px solid var(--border);
            color: var(--fg); border-radius: 6px; font-family: inherit;
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        
        .btn-primary {
            background: var(--accent); color: #000;
            border: none; padding: 10px 20px; border-radius: 6px;
            font-weight: bold; cursor: pointer; transition: transform 0.1s;
        }
        .btn-primary:active { transform: scale(0.98); }
        .btn-danger { background: var(--danger); color: #fff; }

        /* Table List */
        .data-list { margin-top: 1.5rem; border-top: 1px solid var(--border); padding-top: 1rem; }
        .data-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px; border-radius: 6px; margin-bottom: 5px;
            background: rgba(255,255,255,0.02);
        }
        .data-item span { font-size: 0.9rem; }
        .data-item-actions { display: flex; gap: 5px; }
        .btn-xs { padding: 4px 8px; font-size: 0.75rem; border-radius: 4px; border: none; cursor: pointer; }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar { display: none; } /* Simple hide for mobile */
            .form-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- Login Screen -->
    <div id="login-screen">
        <div class="login-box">
            <h1>Admin Access</h1>
            <p style="font-size: 0.8rem; color: #94a3b8; margin-bottom: 1.5rem;">Enter password to manage data</p>
            <input type="password" id="password-input" placeholder="Password">
            <button onclick="checkPassword()">Enter</button>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="admin-dashboard">
        <header>
            <h1>⚙️ Admin Control Panel</h1>
            <button onclick="logout()">Logout</button>
        </header>

        <div class="main-content">
            <!-- Sidebar -->
            <aside class="sidebar">
                <button class="nav-item active" onclick="showSection('main-data')">Main Site Data</button>
                <button class="nav-item" onclick="showSection('brain-cats')">Brain Categories</button>
                <button class="nav-item" onclick="showSection('brain-data')">Brain Questions</button>
                <div style="margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--border);">
                    <button class="btn-primary" style="width: 100%;" onclick="downloadAllData()">⬇️ Download Files</button>
                    <p style="font-size: 0.7rem; color: #64748b; margin-top: 0.5rem; text-align: center;">
                        Replace <code>data.js</code> & <code>data2.js</code> in your repo.
                    </p>
                </div>
            </aside>

            <!-- Content -->
            <div class="content-area">
                
                <!-- Section 1: Main Site Data -->
                <section id="sec-main-data" class="section-content">
                    <div class="admin-card">
                        <h2>Add / Edit Main Site Data</h2>
                        <p style="font-size: 0.85rem; color: #94a3b8; margin-bottom: 1rem;">
                            This controls the "Countries", "Palestine", "Sovereignty", "External" sections.
                        </p>
                        
                        <div class="form-group">
                            <label>Select Existing Entry to Edit (Optional)</label>
                            <select id="main-select" onchange="loadMainData()">
                                <option value="">-- New Entry --</option>
                            </select>
                        </div>

                        <input type="hidden" id="main-edit-id">
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label>ID (Unique Number)</label>
                                <input type="number" id="main-id" placeholder="e.g., 300">
                            </div>
                            <div class="form-group">
                                <label>Level / Section</label>
                                <select id="main-level">
                                    <option value="1">Level 1 (Integration)</option>
                                    <option value="2">Level 2 (Dependency)</option>
                                    <option value="3">Level 3 (Coordination)</option>
                                    <option value="4">Level 4 (Immunity)</option>
                                    <option value="5">Level 5 (Clash)</option>
                                    <option value="0">Special Section (Palestine/Sov/Ext)</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Name / Title</label>
                            <input type="text" id="main-name" placeholder="e.g., America">
                        </div>

                        <div class="form-group">
                            <label>Subtitle</label>
                            <input type="text" id="main-subtitle" placeholder="e.g., The Tool">
                        </div>

                        <div class="form-group">
                            <label>Content (Events/Details)</label>
                            <textarea id="main-events" rows="6" placeholder="Use \n for new lines. Use \t for table columns."></textarea>
                        </div>

                        <div class="form-group">
                            <label>Links (JSON Format)</label>
                            <textarea id="main-links" rows="2" placeholder='[{"name": "Link Name", "url": "https://..."}]'></textarea>
                        </div>

                        <div style="display: flex; gap: 1rem;">
                            <button class="btn-primary" onclick="saveMainData()">Save Entry</button>
                            <button class="btn-primary btn-danger" onclick="deleteMainData()">Delete</button>
                        </div>

                        <div class="data-list" id="main-list"></div>
                    </div>
                </section>

                <!-- Section 2: Brain Categories -->
                <section id="sec-brain-cats" class="section-content" style="display: none;">
                    <div class="admin-card">
                        <h2>Manage Brain Categories</h2>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label>Category ID (English, no spaces)</label>
                                <input type="text" id="cat-id" placeholder="e.g., social">
                            </div>
                            <div class="form-group">
                                <label>Icon (Emoji)</label>
                                <input type="text" id="cat-icon" placeholder="e.g., 🤝">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Category Name (Arabic)</label>
                            <input type="text" id="cat-name" placeholder="e.g., اجتماعي">
                        </div>
                        <button class="btn-primary" onclick="saveCategory()">Add Category</button>

                        <div class="data-list" id="cat-list"></div>
                    </div>
                </section>

                <!-- Section 3: Brain Questions -->
                <section id="sec-brain-data" class="section-content" style="display: none;">
                    <div class="admin-card">
                        <h2>Manage Brain Questions</h2>
                        
                        <div class="form-group">
                            <label>Select Question to Edit</label>
                            <select id="brain-select" onchange="loadBrainData()">
                                <option value="">-- New Question --</option>
                            </select>
                        </div>
                        <input type="hidden" id="brain-edit-id">

                        <div class="form-row">
                            <div class="form-group">
                                <label>ID (Number)</label>
                                <input type="number" id="brain-id" placeholder="e.g., 101">
                            </div>
                            <div class="form-group">
                                <label>Category</label>
                                <select id="brain-cat"></select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Question</label>
                            <input type="text" id="brain-q" placeholder="e.g., What is patience?">
                        </div>

                        <div class="form-group">
                            <label>Answer</label>
                            <textarea id="brain-a" rows="4" placeholder="Detailed answer..."></textarea>
                        </div>

                        <div class="form-group">
                            <label>Reference</label>
                            <input type="text" id="brain-ref" placeholder="e.g., Surah Al-Baqarah">
                        </div>

                        <div style="display: flex; gap: 1rem;">
                            <button class="btn-primary" onclick="saveBrainData()">Save Question</button>
                            <button class="btn-primary btn-danger" onclick="deleteBrainData()">Delete</button>
                        </div>

                        <div class="data-list" id="brain-list"></div>
                    </div>
                </section>

            </div>
        </div>
    </div>

    <!-- Logic -->
    <script>
        // ===== SECURITY =====
        const PASSWORD = "theone123";
        let isLoggedIn = false;

        function checkPassword() {
            const input = document.getElementById('password-input').value;
            if (input === PASSWORD) {
                isLoggedIn = true;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-dashboard').style.display = 'flex';
                loadDataFromLocalStorage(); // Load saved drafts if any
            } else {
                alert("Incorrect Password");
            }
        }

        function logout() {
            isLoggedIn = false;
            location.reload();
        }

        // ===== DATA STORE =====
        // Initialize with existing data structure (Empty or defaults)
        let appData = {
            countriesData: [],
            brainCategories: [
                { id: "social", name: "اجتماعي", icon: "🤝" },
                { id: "daily", name: "يوميات", icon: "📅" }
            ],
            brainData: []
        };

        // ===== NAVIGATION =====
        function showSection(id) {
            document.querySelectorAll('.section-content').forEach(el => el.style.display = 'none');
            document.getElementById('sec-' + id).style.display = 'block';
            
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.target.classList.add('active');
        }

        // ===== MAIN DATA LOGIC =====
        function renderMainList() {
            const list = document.getElementById('main-list');
            list.innerHTML = appData.countriesData.map((d, i) => `
                <div class="data-item">
                    <span>[${d.id}] ${d.name} (Lvl: ${d.level})</span>
                    <div class="data-item-actions">
                        <button class="btn-xs btn-primary" onclick="editMain(${i})">Edit</button>
                    </div>
                </div>
            `).join('');

            // Update Select
            const sel = document.getElementById('main-select');
            sel.innerHTML = '<option value="">-- New Entry --</option>' + 
            appData.countriesData.map((d, i) => `<option value="${i}">${d.name}</option>`).join('');
        }

        function editMain(index) {
            const d = appData.countriesData[index];
            document.getElementById('main-edit-id').value = index;
            document.getElementById('main-id').value = d.id;
            document.getElementById('main-level').value = d.level;
            document.getElementById('main-name').value = d.name;
            document.getElementById('main-subtitle').value = d.subtitle || '';
            document.getElementById('main-events').value = d.events || '';
            document.getElementById('main-links').value = JSON.stringify(d.links || []);
            document.getElementById('main-select').value = index;
        }

        function loadMainData() {
            const val = document.getElementById('main-select').value;
            if (val !== "") editMain(parseInt(val));
            else clearMainForm();
        }

        function clearMainForm() {
            document.getElementById('main-edit-id').value = '';
            document.getElementById('main-id').value = '';
            document.getElementById('main-name').value = '';
            document.getElementById('main-subtitle').value = '';
            document.getElementById('main-events').value = '';
            document.getElementById('main-links').value = '';
        }

        function saveMainData() {
            const editIndex = document.getElementById('main-edit-id').value;
            const newItem = {
                id: parseInt(document.getElementById('main-id').value),
                level: parseInt(document.getElementById('main-level').value),
                name: document.getElementById('main-name').value,
                subtitle: document.getElementById('main-subtitle').value,
                events: document.getElementById('main-events').value,
                links: []
            };

            try {
                newItem.links = JSON.parse(document.getElementById('main-links').value || "[]");
            } catch (e) {
                alert("Invalid JSON in Links field. Use [] for empty.");
                return;
            }

            if (editIndex !== "") {
                appData.countriesData[parseInt(editIndex)] = newItem;
            } else {
                // Check duplicate ID
                if (appData.countriesData.some(d => d.id === newItem.id)) {
                    alert("ID already exists! Use a unique ID.");
                    return;
                }
                appData.countriesData.push(newItem);
            }
            
            saveDataToLocalStorage();
            renderMainList();
            clearMainForm();
            alert("Saved to memory! Remember to Download Files.");
        }

        function deleteMainData() {
            const editIndex = document.getElementById('main-edit-id').value;
            if (editIndex !== "") {
                appData.countriesData.splice(parseInt(editIndex), 1);
                saveDataToLocalStorage();
                renderMainList();
                clearMainForm();
            }
        }

        // ===== BRAIN CATEGORY LOGIC =====
        function renderCatList() {
            const list = document.getElementById('cat-list');
            list.innerHTML = appData.brainCategories.map(c => `
                <div class="data-item">
                    <span>${c.icon} ${c.name} (${c.id})</span>
                </div>
            `).join('');
            
            // Update Brain Data Dropdown
            const sel = document.getElementById('brain-cat');
            sel.innerHTML = appData.brainCategories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        }

        function saveCategory() {
            const id = document.getElementById('cat-id').value;
            const name = document.getElementById('cat-name').value;
            const icon = document.getElementById('cat-icon').value;
            if(!id || !name) return alert("Fill all fields");
            
            // Prevent duplicate ID
            if (appData.brainCategories.some(c => c.id === id)) {
                return alert("Category ID already exists");
            }

            appData.brainCategories.push({ id, name, icon });
            saveDataToLocalStorage();
            renderCatList();
            // Clear inputs
            document.getElementById('cat-id').value = ''; 
            document.getElementById('cat-name').value = ''; 
            document.getElementById('cat-icon').value = '';
        }

        // ===== BRAIN DATA LOGIC =====
        function renderBrainList() {
            const list = document.getElementById('brain-list');
            list.innerHTML = appData.brainData.map((d, i) => `
                <div class="data-item">
                    <span>${d.question}</span>
                    <div class="data-item-actions">
                        <button class="btn-xs btn-primary" onclick="editBrain(${i})">Edit</button>
                    </div>
                </div>
            `).join('');

            const sel = document.getElementById('brain-select');
            sel.innerHTML = '<option value="">-- New Question --</option>' + 
            appData.brainData.map((d, i) => `<option value="${i}">${d.question}</option>`).join('');
        }

        function editBrain(index) {
            const d = appData.brainData[index];
            document.getElementById('brain-edit-id').value = index;
            document.getElementById('brain-id').value = d.id;
            document.getElementById('brain-cat').value = d.category;
            document.getElementById('brain-q').value = d.question;
            document.getElementById('brain-a').value = d.answer;
            document.getElementById('brain-ref').value = d.reference;
            document.getElementById('brain-select').value = index;
        }

        function loadBrainData() {
            const val = document.getElementById('brain-select').value;
            if (val !== "") editBrain(parseInt(val));
            else clearBrainForm();
        }

        function clearBrainForm() {
            document.getElementById('brain-edit-id').value = '';
            document.getElementById('brain-id').value = '';
            document.getElementById('brain-q').value = '';
            document.getElementById('brain-a').value = '';
            document.getElementById('brain-ref').value = '';
        }

        function saveBrainData() {
            const editIndex = document.getElementById('brain-edit-id').value;
            const newItem = {
                id: parseInt(document.getElementById('brain-id').value),
                category: document.getElementById('brain-cat').value,
                question: document.getElementById('brain-q').value,
                answer: document.getElementById('brain-a').value,
                reference: document.getElementById('brain-ref').value
            };

            if (editIndex !== "") {
                appData.brainData[parseInt(editIndex)] = newItem;
            } else {
                if (appData.brainData.some(d => d.id === newItem.id)) {
                    alert("ID already exists!");
                    return;
                }
                appData.brainData.push(newItem);
            }
            
            saveDataToLocalStorage();
            renderBrainList();
            clearBrainForm();
            alert("Question Saved!");
        }

        function deleteBrainData() {
            const editIndex = document.getElementById('brain-edit-id').value;
            if (editIndex !== "") {
                appData.brainData.splice(parseInt(editIndex), 1);
                saveDataToLocalStorage();
                renderBrainList();
                clearBrainForm();
            }
        }

        // ===== PERSISTENCE & DOWNLOAD =====
        function saveDataToLocalStorage() {
            localStorage.setItem('adminData', JSON.stringify(appData));
        }

        function loadDataFromLocalStorage() {
            const saved = localStorage.getItem('adminData');
            if (saved) {
                appData = JSON.parse(saved);
            }
            renderAll();
        }

        function renderAll() {
            renderMainList();
            renderCatList();
            renderBrainList();
        }

        function downloadAllData() {
            // Generate data.js content
            const levels = {
                1: { title: "المحور الأول: دول الاندماج العضوي", desc: "تطبيع كامل" },
                2: { title: "المحور الثاني: دول الارتهان الجغرافي", desc: "تبعية القسر" },
                3: { title: "المحور الثالث: دول التنسيق الوظيفي", desc: "تطبيع الظل" },
                4: { title: "المحور الرابع: دول الحصانة الشعبية", desc: "خندق الرفض" },
                5: { title: "المحور الخامس: دول الصدام والسيادة", desc: "محور المواجهة" }
            };
            
            const dataJsContent = `// data.js\nconst levels = ${JSON.stringify(levels, null, 2)};\nconst countriesData = ${JSON.stringify(appData.countriesData, null, 2)};\nconst bigEventsData = [];`;
            
            downloadFile(dataJsContent, 'data.js', 'text/javascript');

            // Generate data2.js content
            const data2JsContent = `// data2.js\nconst brainCategories = ${JSON.stringify(appData.brainCategories, null, 2)};\nconst brainData = ${JSON.stringify(appData.brainData, null, 2)};`;
            downloadFile(data2JsContent, 'data2.js', 'text/javascript');
        }

        function downloadFile(content, fileName, contentType) {
            const a = document.createElement("a");
            const file = new Blob([content], { type: contentType });
            a.href = URL.createObjectURL(file);
            a.download = fileName;
            a.click();
            URL.revokeObjectURL(a.href);
        }

        // Initialize
        renderAll();

    </script>
</body>
</html>
