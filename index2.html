<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Revolution</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* --- CSS STYLES --- */
        :root {
            --bg: #050505;
            --card: #111;
            --border: #333;
            --accent: #007a3d;
            --text: #e0e0e0;
            --muted: #888;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; display: none; /* Hidden until login */
        }
        body.logged-in { display: flex; }

        /* Login Screen */
        #login-screen {
            position: fixed; inset: 0;
            background: #000;
            display: flex; align-items: center; justify-content: center;
            z-index: 1000;
        }
        #login-box {
            background: var(--card); padding: 3rem;
            border: 1px solid var(--border);
            border-radius: 10px; text-align: center;
            width: 100%; max-width: 400px;
        }
        #login-box h2 { margin-bottom: 1.5rem; color: var(--accent); }
        input[type="password"], input[type="text"], select, textarea {
            width: 100%; padding: 12px;
            background: #222; border: 1px solid #444;
            color: #fff; border-radius: 5px;
            font-size: 1rem; outline: none;
            font-family: 'Inter', sans-serif;
        }
        textarea { resize: vertical; min-height: 100px; }
        select { cursor: pointer; }
        button {
            padding: 10px 20px; background: var(--accent);
            color: #fff; border: none; border-radius: 5px;
            cursor: pointer; font-weight: 600; transition: opacity 0.3s;
            margin-top: 1rem; width: 100%;
            font-family: 'Inter', sans-serif;
        }
        button:hover { opacity: 0.9; }
        button:disabled { background: #555; cursor: not-allowed; }
        .error-msg { color: #ff4444; margin-top: 1rem; font-size: 0.9rem; display: none; }

        /* Admin Layout */
        .admin-container { display: flex; width: 100%; min-height: 100vh; }
        
        /* Sidebar */
        .sidebar {
            width: 250px; background: #111;
            border-right: 1px solid var(--border);
            padding: 2rem 1rem;
            display: flex; flex-direction: column; gap: 1rem;
            flex-shrink: 0;
        }
        .sidebar h3 { color: var(--accent); font-size: 1.2rem; margin-bottom: 1rem; padding: 0 0.5rem; }
        .sidebar-btn {
            background: transparent; color: var(--muted);
            text-align: left; padding: 12px; border-radius: 5px;
            width: 100%; margin: 0; border: none;
        }
        .sidebar-btn:hover, .sidebar-btn.active { background: #222; color: #fff; }
        .sidebar-footer { margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--border); }

        /* Main Content */
        .main-content { flex: 1; padding: 2rem; overflow-y: auto; background: #080808; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
        .header h1 { font-size: 1.5rem; }
        .btn-group { display: flex; gap: 0.5rem; }
        .btn-secondary { background: #333; width: auto; padding: 10px 20px; }
        .btn-primary { background: var(--accent); width: auto; }
        
        /* Table */
        .table-container { overflow-x: auto; background: var(--card); border-radius: 8px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: #1a1a1a; color: var(--muted); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.5px; }
        tr:hover { background: rgba(255,255,255,0.03); }
        .action-btn { 
            background: transparent; color: var(--accent); width: auto;
            padding: 5px 10px; font-size: 0.8rem; border: 1px solid var(--accent);
            border-radius: 4px; margin: 0;
        }
        .action-btn.delete { border-color: #ff4444; color: #ff4444; margin-left: 5px; }
        .action-btn:hover { background: rgba(0, 122, 61, 0.1); }
        .action-btn.delete:hover { background: rgba(255, 68, 68, 0.1); }

        /* Modal Editor */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: none; align-items: center; justify-content: center; z-index: 500;
            padding: 1rem;
        }
        .modal-overlay.show { display: flex; }
        .modal-content {
            background: #0a0a0a; padding: 2rem;
            border-radius: 10px; width: 100%; max-width: 600px;
            max-height: 90vh; overflow-y: auto;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
        .modal-header h2 { font-size: 1.2rem; color: #fff; }
        .close-btn { background: transparent; color: #fff; width: 30px; height: 30px; padding: 0; border: 1px solid #444; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }

        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: #aaa; font-size: 0.9rem; font-weight: 600; }
        
        /* Responsive */
        @media (max-width: 768px) {
            .admin-container { flex-direction: column; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); padding: 1rem; overflow-x: auto; flex-direction: row; }
            .sidebar h3 { display: none; }
            .sidebar-btn { white-space: nowrap; }
            .sidebar-footer { border-top: none; padding-top: 0; margin-top: 0; }
        }
    </style>
</head>
<body>

    <!-- Login Screen -->
    <div id="login-screen">
        <div id="login-box">
            <h2>🔐 Admin Access</h2>
            <input type="password" id="password-input" placeholder="Enter Password" autofocus>
            <button onclick="attemptLogin()">Unlock</button>
            <div class="error-msg" id="error-msg">Incorrect Password</div>
        </div>
    </div>

    <!-- Admin Interface -->
    <div class="admin-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div>
                <h3>Dashboard</h3>
                <button class="sidebar-btn active" onclick="loadData('main')">Main Data (Site)</button>
                <button class="sidebar-btn" onclick="loadData('brain')">Brain Data (Light)</button>
            </div>
            <div class="sidebar-footer">
                <button class="sidebar-btn" style="color: #ff4444;" onclick="logout()">Logout</button>
            </div>
        </aside>

        <!-- Main Area -->
        <main class="main-content">
            <div class="header">
                <h1 id="page-title">Manage Main Data</h1>
                <div class="btn-group">
                    <button class="btn-secondary" onclick="downloadCurrentData()">⬇ Download Updated File</button>
                    <button class="btn-primary" onclick="openModal('new')">+ Add New Item</button>
                </div>
            </div>
            
            <div class="table-container">
                <div id="data-table-container">
                    <!-- Table injected here -->
                </div>
            </div>
        </main>
    </div>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="edit-modal" onclick="if(event.target === this) closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 id="modal-title">Edit Item</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            
            <div class="form-group">
                <label>ID (Unique Number)</label>
                <input type="number" id="form-id" placeholder="e.g. 500">
            </div>
            
            <div class="form-group">
                <label>Name / Title</label>
                <input type="text" id="form-name" placeholder="e.g. فلسطين">
            </div>

            <div class="form-group" id="field-level">
                <label>Level (1-5 for Countries, 0 for Special)</label>
                <input type="number" id="form-level" placeholder="0">
            </div>

            <div class="form-group" id="field-category" style="display:none;">
                <label>Category</label>
                <select id="form-category">
                    <!-- Options injected via JS -->
                </select>
            </div>

            <div class="form-group">
                <label>Subtitle</label>
                <input type="text" id="form-subtitle" placeholder="Short description">
            </div>

            <div class="form-group">
                <label>Content (Events / Answer)</label>
                <textarea id="form-events" rows="6" placeholder="Main content goes here..."></textarea>
            </div>

            <div class="form-group" id="field-ref">
                <label>Reference</label>
                <input type="text" id="form-ref" placeholder="e.g. Surah Al-Baqarah">
            </div>

            <button onclick="saveItem()">Save Changes</button>
        </div>
    </div>

    <!-- External Data Scripts -->
    <script src="data.js"></script>
    <script src="data2.js"></script>

    <script>
        // ===== STATE =====
        let currentMode = 'main'; // 'main' or 'brain'
        let editingIndex = -1; // -1 for new
        const CORRECT_PASS = "theone123";

        // ===== AUTH =====
        function attemptLogin() {
            const input = document.getElementById('password-input').value;
            if (input === CORRECT_PASS) {
                document.body.classList.add('logged-in');
                document.getElementById('login-screen').style.display = 'none';
                localStorage.setItem('admin_logged_in', 'true');
                loadData('main');
            } else {
                document.getElementById('error-msg').style.display = 'block';
                document.getElementById('password-input').value = '';
            }
        }

        function logout() {
            document.body.classList.remove('logged-in');
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('error-msg').style.display = 'none';
            localStorage.removeItem('admin_logged_in');
        }

        // Check session on load
        if (localStorage.getItem('admin_logged_in') === 'true') {
            document.body.classList.add('logged-in');
            document.getElementById('login-screen').style.display = 'none';
            loadData('main');
        }
        
        // Enter key login
        document.getElementById("password-input").addEventListener("keyup", function(event) {
            if (event.key === "Enter") attemptLogin();
        });

        // ===== DATA MANAGEMENT =====
        function loadData(type) {
            currentMode = type;
            
            // Update UI active state
            document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
            // The event target might be window if called programmatically, so we find the button
            const activeBtn = Array.from(document.querySelectorAll('.sidebar-btn')).find(b => b.textContent.toLowerCase().includes(type));
            if(activeBtn) activeBtn.classList.add('active');

            document.getElementById('page-title').innerText = type === 'main' ? 'Manage Main Data (Site)' : 'Manage Brain Data (Light)';
            
            // Toggle fields visibility
            document.getElementById('field-level').style.display = type === 'main' ? 'block' : 'none';
            document.getElementById('field-category').style.display = type === 'brain' ? 'block' : 'none';
            document.getElementById('field-ref').style.display = type === 'brain' ? 'block' : 'none';

            // Populate Category Select for Brain
            if (type === 'brain') {
                const sel = document.getElementById('form-category');
                sel.innerHTML = brainCategories.map(c => `<option value="${c.id}">${c.icon} ${c.name}</option>`).join('');
            }

            renderTable();
        }

        function renderTable() {
            const container = document.getElementById('data-table-container');
            const data = currentMode === 'main' ? countriesData : brainData;
            
            let html = `<table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>${currentMode === 'main' ? 'Name' : 'Question'}</th>
                        <th>${currentMode === 'main' ? 'Level' : 'Category'}</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>`;

            data.forEach((item, index) => {
                html += `
                    <tr>
                        <td style="font-family: monospace; color: #888;">#${item.id}</td>
                        <td style="max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                            ${item.name || item.question}
                        </td>
                        <td>
                            <span style="background: #222; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem;">
                                ${item.level !== undefined ? item.level : item.category}
                            </span>
                        </td>
                        <td>
                            <button class="action-btn" onclick="openModal(${index})">Edit</button>
                            <button class="action-btn delete" onclick="deleteItem(${index})">Delete</button>
                        </td>
                    </tr>
                `;
            });

            html += `</tbody></table>`;
            container.innerHTML = html;
        }

        // ===== MODAL LOGIC =====
        function openModal(index) {
            editingIndex = index;
            const modal = document.getElementById('edit-modal');
            const data = currentMode === 'main' ? countriesData : brainData;
            
            // Clear form if new
            if (index === 'new') {
                document.getElementById('modal-title').innerText = "Add New Item";
                document.getElementById('form-id').value = '';
                document.getElementById('form-name').value = '';
                document.getElementById('form-level').value = '0';
                document.getElementById('form-subtitle').value = '';
                document.getElementById('form-events').value = '';
                document.getElementById('form-ref').value = '';
                if(currentMode === 'brain') document.getElementById('form-category').value = brainCategories[0].id;
            } else {
                // Fill form if editing
                const item = data[index];
                document.getElementById('modal-title').innerText = "Edit Item";
                document.getElementById('form-id').value = item.id;
                document.getElementById('form-name').value = item.name || item.question;
                document.getElementById('form-level').value = item.level || 0;
                document.getElementById('form-subtitle').value = item.subtitle || '';
                document.getElementById('form-events').value = item.events || item.answer || '';
                document.getElementById('form-ref').value = item.reference || '';
                if(item.category) document.getElementById('form-category').value = item.category;
            }
            
            modal.classList.add('show');
        }

        function closeModal() {
            document.getElementById('edit-modal').classList.remove('show');
        }

        function saveItem() {
            const data = currentMode === 'main' ? countriesData : brainData;
            
            // Basic Validation
            const newId = parseInt(document.getElementById('form-id').value);
            if (!newId) {
                alert("ID is required and must be a number.");
                return;
            }

            const newItem = {
                id: newId,
                name: document.getElementById('form-name').value,
                subtitle: document.getElementById('form-subtitle').value,
                links: []
            };

            if (currentMode === 'main') {
                newItem.level = parseInt(document.getElementById('form-level').value);
                newItem.events = document.getElementById('form-events').value;
                // Preserve links if editing
                if (editingIndex !== 'new' && data[editingIndex].links) {
                    newItem.links = data[editingIndex].links;
                }
            } else {
                newItem.question = newItem.name; // Map name to question
                delete newItem.name;
                newItem.answer = document.getElementById('form-events').value; // Map events to answer
                delete newItem.events;
                newItem.reference = document.getElementById('form-ref').value;
                newItem.category = document.getElementById('form-category').value;
            }

            if (editingIndex === 'new') {
                data.push(newItem);
            } else {
                data[editingIndex] = newItem;
            }

            closeModal();
            renderTable();
            alert("Saved locally! Remember to click 'Download Updated File' to save your changes to your computer.");
        }

        function deleteItem(index) {
            if(confirm("Are you sure you want to delete this item?")) {
                const data = currentMode === 'main' ? countriesData : brainData;
                data.splice(index, 1);
                renderTable();
            }
        }

        // ===== EXPORT / DOWNLOAD =====
        function downloadCurrentData() {
            let dataStr, fileName;

            if (currentMode === 'main') {
                // We need to format it nicely, preserving the `levels` object
                const levelsStr = JSON.stringify(levels, null, 2);
                const dataStrRaw = JSON.stringify(countriesData, null, 2);
                const content = `// data.js\n\nconst levels = ${levelsStr};\n\nconst countriesData = ${dataStrRaw};\n\nconst bigEventsData = [];`;
                dataStr = content;
                fileName = 'data.js';
            } else {
                const catsStr = JSON.stringify(brainCategories, null, 2);
                const dataStrRaw = JSON.stringify(brainData, null, 2);
                const content = `// data2.js\n\nconst brainCategories = ${catsStr};\n\nconst brainData = ${dataStrRaw};`;
                dataStr = content;
                fileName = 'data2.js';
            }

            const blob = new Blob([dataStr], { type: "text/javascript" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
